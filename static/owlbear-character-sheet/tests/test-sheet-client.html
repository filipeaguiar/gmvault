<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tests - sheet-client.js</title>
  <style>
    body { font-family: monospace; margin: 1rem; background: #111; color: #eee; }
    .pass { color: #4caf50; }
    .fail { color: #f44336; }
    #results { white-space: pre-wrap; }
  </style>
</head>
<body>
<h1>Character sheet client tests</h1>
<div id="results"></div>
<iframe id="sheet" hidden></iframe>
<script type="module">
const SOURCE = "io.github.filipeaguiar.character-sheet";
const log = document.getElementById("results");
const iframe = document.getElementById("sheet");
let passed = 0;
let failed = 0;
const requests = [];

function assert(condition, label) {
  if (condition) {
    passed += 1;
    log.innerHTML += `<span class="pass">PASS ${label}</span>\n`;
  } else {
    failed += 1;
    log.innerHTML += `<span class="fail">FAIL ${label}</span>\n`;
  }
}

function wait(ms = 30) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

function envelope(type, payload) {
  return { source: SOURCE, version: 1, type, payload };
}

window.addEventListener("message", (event) => {
  const data = event.data;
  if (event.source !== iframe.contentWindow || data?.source !== SOURCE || data.type !== "roll-request") return;
  requests.push(data.payload);
  const notation = data.payload.notation;
  const total = notation === "1d20+7" ? 19 : 8;
  event.source.postMessage(envelope("roll-result", {
    requestId: data.payload.requestId,
    rollId: `roll-${requests.length}`,
    total,
    summary: `${notation} = ${total}`,
    groups: [],
  }), event.origin);
});

iframe.srcdoc = `<!DOCTYPE html><html><body>
<span id="skill" data-roll-notation="1d20+7" data-roll-label="Acrobacia">+7</span>
<span id="damage" data-roll-notation="2d6+1" data-roll-label="Dano">2d6+1</span>
<span id="reference">Texto normal</span>
<script src="../sheet-client.js" defer><\/script>
</body></html>`;

await new Promise((resolve) => iframe.addEventListener("load", resolve, { once: true }));
await wait();

const sheetDocument = iframe.contentDocument;
const skill = sheetDocument.getElementById("skill");
const damage = sheetDocument.getElementById("damage");
const reference = sheetDocument.getElementById("reference");

assert(!skill.hasAttribute("role"), "value remains text before Dice+ readiness");
assert(!reference.hasAttribute("role"), "plain reference text is never enhanced");

iframe.contentWindow.postMessage(envelope("dice-ready", { ready: true }), location.origin);
await wait();

assert(skill.getAttribute("role") === "button", "skill value becomes a control after readiness");
assert(skill.getAttribute("tabindex") === "0", "enhanced value is keyboard focusable");
assert(skill.textContent.trim() === "+7", "visible value remains the original bonus");
assert(damage.getAttribute("role") === "button", "damage formula is enhanced");
assert(!reference.hasAttribute("role"), "unmarked text remains non-interactive");

skill.click();
damage.click();
await wait(80);

assert(requests.length === 2, "two independent roll requests are emitted");
assert(requests[0].notation === "1d20+7", "skill notation is preserved");
assert(requests[1].notation === "2d6+1", "damage notation is preserved");
assert(requests[0].requestId !== requests[1].requestId, "requests use distinct identifiers");
assert(skill.classList.contains("roll-success"), "first result updates the originating value");
assert(damage.classList.contains("roll-success"), "second result updates the originating value");
assert(skill.textContent.includes("19"), "skill result total is displayed");
assert(damage.textContent.includes("8"), "damage result total is displayed");

iframe.contentWindow.postMessage(envelope("dice-ready", { ready: false }), location.origin);
await wait();
assert(!skill.hasAttribute("role"), "enhancement is removed when Dice+ becomes unavailable");
assert(!damage.hasAttribute("role"), "all enhanced values return to reference mode");

const total = passed + failed;
const resultClass = failed ? "fail" : "pass";
log.innerHTML += `\n<span class="${resultClass}">${passed}/${total} passed</span>\n`;
</script>
</body>
</html>
