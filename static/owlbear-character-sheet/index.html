<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Register before external resources or body parsing. Owlbear can send
    // OBR_READY very early on Chromium Android.
    window.__gmvaultEarlyObrReady = [];
    window.addEventListener("message", (event) => {
      if (event.data?.id === "OBR_READY") {
        window.__gmvaultEarlyObrReady.push({ data: event.data, origin: event.origin });
        window.__gmvaultEarlyObrReady = window.__gmvaultEarlyObrReady.slice(-2);
      }
    }, true);
  </script>
  <title>Fichas de Personagem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link id="extension-style" rel="stylesheet">
</head>
<body>
  <div id="status-bar" role="status" aria-live="polite">Carregando...</div>

  <div id="character-selector">
    <h2>Selecionar Personagem</h2>
    <div id="character-list"></div>
    <details id="debug-panel">
      <summary>Diagnóstico da conexão</summary>
      <pre id="debug-log" aria-live="polite"></pre>
    </details>
  </div>

  <div id="sheet-container" hidden>
    <button id="change-character-btn" title="Trocar personagem" aria-label="Trocar personagem">Trocar personagem</button>
    <iframe id="character-iframe" title="Ficha de Personagem"></iframe>
  </div>

  <script>
    // The extension is small and changes must reach mobile browsers promptly.
    // A unique URL on each opening bypasses stale GitHub Pages/browser assets.
    document.getElementById("extension-style").href = `style.css?cache=${Date.now()}`;
  </script>
  <script type="module">
    import(`./main.js?cache=${Date.now()}`);
  </script>
</body>
</html>
