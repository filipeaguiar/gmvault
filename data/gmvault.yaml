# Configurações do GM-Vault & Combat Tracker

# Lista de slugs das aventuras ativas a serem exportadas para o GM-Vault
active_adventures:
  - "a-most-potent-brew"

# Lista de monstros a serem carregados automaticamente no Combat Tracker
# Configurada com as criaturas referenciadas em a-most-potent-brew.
combat_monsters:
  - name: "Giant Rat"
    ref: "/compendium/monsters/giant-rat/"
    qty: 8
  - name: "Giant Centipede"
    ref: "/compendium/monsters/giant-centipede/"
    qty: 3
  - name: "Giant Inferno Spider"
    ref: "/compendium/monsters/giant-inferno-spider/"
    qty: 1
