baseURL: https://filipeaguiar.github.io/gmvault/
languageCode: en-us
title: Campanha

server:
  headers:
    - for: "/**"
      values:
        Access-Control-Allow-Origin: "*"

params:
  forge:
    author: "GM - Filipe"

ignoreLogs:
  - "warning-goldmark-raw-html"
  - "deprecated: kind in front matter was deprecated in Hugo v0.144.0 and will be removed in a future release."

mediaTypes:
  application/json:
    suffixes:
      - json

outputFormats:
  GMVault:
    mediaType: application/json
    baseName: gm-vault
    isPlainText: true
    notAlternative: true
  Forge:
    mediaType: application/json
    baseName: statblocks
    path: exports/forge
    isPlainText: true
    notAlternative: true
  ForgeChar:
    mediaType: application/json
    baseName: forge
    isPlainText: true
    notAlternative: false
  CharacterCatalog:
    mediaType: application/json
    baseName: character-catalog
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - GMVault
    - Forge
    - CharacterCatalog
  section:
    - HTML
    - GMVault

markup:
  goldmark:
    renderer:
      unsafe: true
